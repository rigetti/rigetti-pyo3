name: Prepare Release

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      type:
        type: choice
        description: Bump versions and trigger a new release.
        required: true
        default: release
        options:
          - release
          - prerelease
      ref:
        description: Branch/tag/SHA to run release from.
        required: true
        type: string

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.PAT }}
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}
      - uses: Swatinem/rust-cache@v2

      - name: Validate release ref
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail

          resolved_head="$(git rev-parse HEAD)"
          resolved_ref="$(git rev-parse "$RELEASE_REF")"

          echo "Running on ref: $RELEASE_REF"
          echo "Resolved ref SHA: $resolved_ref"
          echo "Checked out SHA: $resolved_head"

          if [[ "$resolved_head" != "$resolved_ref" ]]; then
            echo "Checked out commit does not match requested ref: $RELEASE_REF"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --global user.name "${{ github.triggering_actor }}"
          git config --global user.email "${{ github.triggering_actor}}@users.noreply.github.com"

      - name: Install Knope
        uses: knope-dev/action@v2.1.0
        with:
          version: 0.21.3 # Test before updating, breaking changes likely: https://github.com/knope-dev/action#install-latest-version

      - name: Dry-run Release
        run: knope release --verbose --dry-run
        if: github.event_name == 'pull_request'

      - name: Prepare Prerelease
        run: knope release --verbose --prerelease-label=rc
        if: github.event_name == 'workflow_dispatch' && inputs.type == 'prerelease'

      - name: Release
        run: knope release --verbose
        if: github.event_name == 'workflow_dispatch' && inputs.type == 'release'
